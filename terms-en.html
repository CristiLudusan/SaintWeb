<!DOCTYPE html>
<html lang="en">
   

   <style>

      body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    overflow-x: hidden; /* Previne scroll-ul orizontal accidental */
}

body
{
    background-image: url(./images/saint_interior.png);
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

@font-face {
    font-family: TitleFont;
    src: url(https://fonts.cdnfonts.com/css/helvetica-neue-555c) format('woff2');
}

.home-layer
{
    background-color: rgba(0, 0, 0, 0.8);
    width: 85%;
    height: 40%;
    border-radius: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    place-items: center;
    text-align: center;
    margin: auto;
}
.home-title
{
    font-weight: 200;
    font-size: clamp(5rem, 13vw, 10rem);
    color: white;
    opacity: 1;
    transform: none;
    font-family: TitleFont, sans-serif;
    text-transform: uppercase;
    letter-spacing: 10px;
    user-select: none;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    place-items: center;
    margin: 0;
    letter-spacing: 8px;
}

.home-description
{
    display: flex;
    flex-direction: column;
    align-items: center;
    color: white;
    font-size: 20px;
    user-select: none;
    justify-content: center;
    font-size: 25px;
}

.home-buttons
{
    height: 100px;
    display: flex;
    justify-content: center;
    align-items: center;
    place-items: center;
}

.button1, .button2
{
    --b: 3px;
  --s: .45em;
  --color: #fff;

  margin-left: 20px;
  margin-right: 20px;
  padding: calc(.5em + var(--s)) calc(.9em + var(--s));
  color: var(--color);
  --_p: var(--s);
  background:
    conic-gradient(from 90deg at var(--b) var(--b),#0000 90deg,var(--color) 0)
    var(--_p) var(--_p)/calc(100% - var(--b) - 2*var(--_p)) calc(100% - var(--b) - 2*var(--_p));
  transition: .3s linear, color 0s, background-color 0s;
  outline: var(--b) solid #0000;
  outline-offset: .6em;
  font-size: 25px;

  border: 0;

  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

.button1:hover, .button2:hover, button1:focus-visible, button2:focus-visible
{
  --_p: 0px;
  outline-color: var(--color);
  outline-offset: .05em;
}

.button1:active, .button2:active
{
  background-color: var(--color);
  color: #fff;
}

.home-image
{
    margin-top: 150px;
    margin-bottom: 100px;
    pointer-events: none;
    -webkit-user-drag: none;
}

.introduction
{
    margin-top: 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

.introduction-title
{
    font-size: clamp(2rem, 5vw, 4rem);
    color: white;
    opacity: 1;
    font-family: TitleFont, sans-serif;
    text-transform: uppercase;
    letter-spacing: 10px;
    user-select: none;
    margin-bottom: 90px;
    text-align: center;
    align-items: center;
}

.introduction-left, .introduction-right
{
    display: inline-block;
}

.introduction-content
{
    display: flex;
    gap: 100px;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 25px;
    user-select: none;
    margin-left: 40px;
}

.introduction-layer
{
    background-color: rgba(0, 0, 0, 0.8);
    width: 85%;
    height: 40%;
    border-radius: 40px;
    display: flex;
    margin: 100px auto;  
    align-items: center;
    justify-content: center;  
}

.introduction-right img
{
    border: white solid 6px;
    border-radius: 20px;
    margin-right: 20px;
    margin-bottom: 20px;
}

.program
{
    margin-top: 100px;
    display: flex;
    align-items: center;
}

.program-content
{
    display: flex;
    flex-direction: row; 
    align-items: center; 
    justify-content: center;
    gap: 50px;
    color: white;
    font-size: 25px;
    width: 100%;
    max-width: 1000px;
    user-select: none;
}

.program-content-right
{
    text-align: center; 
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.program-layer
{
    background-color: rgba(0, 0, 0, 0.8);
    width: 85%;
    height: 40%;
    border-radius: 40px;
    display: flex;
    margin: 100px auto;  
    align-items: center;
    justify-content: center;  
}

.program-content-left, .program-content-right
{
    display: inline-block;
}

.about
{
    background-color: rgba(0, 0, 0, 0.8);
    width: 85%;
    height: 40%;
    border-radius: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    place-items: center;
    text-align: center;
    margin: auto;
}

.about-content
{
    display: flex;
    flex-direction: column;
    align-items: center;
    color: white;
    font-size: 25px;
    user-select: none;
    justify-content: center;
    margin: 20px;
}

.about-title
{
    font-size: clamp(2rem, 5vw, 4rem);
    color: white;
    opacity: 1;
    font-family: TitleFont, sans-serif;
    text-transform: uppercase;
    letter-spacing: 10px;
    user-select: none;
    margin-bottom: 20px;
}

.visit-us-layer
{
    background-color: rgba(0, 0, 0, 0.8);
    width: 85%;
    height: 40%;
    border-radius: 40px;
    display: flex;
    margin: 100px auto;  
    align-items: center;
    justify-content: center; 
}

.visit-us
{
    display: flex;
    gap: 100px;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 20px;
    user-select: none;
    margin-left: 40px;
}

.visit-buttons
{
    height: 100px;
    display: flex;
    justify-content: center;
    align-items: center;
    place-items: center;
}

.visit-button-1, .visit-button-2
{
    --b: 3px;
  --s: .45em;
  --color: #fff;

  margin-left: 20px;
  margin-right: 20px;
  margin-top: 10px;
  margin-bottom: 10px;
  padding: calc(.5em + var(--s)) calc(.9em + var(--s));
  color: var(--color);
  --_p: var(--s);
  background:
    conic-gradient(from 90deg at var(--b) var(--b),#0000 90deg,var(--color) 0)
    var(--_p) var(--_p)/calc(100% - var(--b) - 2*var(--_p)) calc(100% - var(--b) - 2*var(--_p));
  transition: .3s linear, color 0s, background-color 0s;
  outline: var(--b) solid #0000;
  outline-offset: .6em;
  font-size: 20px;

  border: 0;

  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

.visit-button-1:hover, .visit-button-2:hover, .visit-button-1:focus-visible, .visit-button-2:focus-visible
{
  --_p: 0px;
  outline-color: var(--color);
  outline-offset: .05em;
}

.visit-button-1:active, .visit-button-2:active
{
  background-color: var(--color);
  color: #fff;
}

.visit-us-title
{
    font-size: clamp(2rem, 5vw, 4rem);
    color: white;
    opacity: 1;
    font-family: TitleFont, sans-serif;
    text-transform: uppercase;
    letter-spacing: 10px;
    user-select: none;
    margin-bottom: 20px;
}

.footer
{
    background-color: black;
    width: 100%;
    border-top: white solid 1px;
}

.main
{
    flex: 1;
}

.footer-content
{
    margin-left: 30px;
    font-size: 20px;
}


.language-switch {
  background: black;
  border-radius: 0.5em;
  box-shadow:
    inset 0px -6px 18px -6px rgba(3, 15, 20, 0),
    inset rgba(54, 69, 75, 1) -1px -1px 6px 0px,
    inset 12px 0px 12px -6px rgba(3, 15, 20, 0),
    inset -12px 0px 12px -6px rgba(3, 15, 20, 0),
    rgba(54, 69, 75, 1) -1px -1px 6px 0px;
  border: solid 2px #030f14;
  cursor: pointer;
  font-size: 18px;
  padding: 0.7em 1.7em;
  outline: none;
  transition: all 0.3s;
  user-select: none;
  position: fixed;
    top: 20px;
  right: 20px;
  z-index: 9999;
}

.language-switch:hover {
  box-shadow:
    inset 0px -6px 18px -6px rgba(3, 15, 20, 1),
    inset 0px 6px 18px -6px rgba(3, 15, 20, 1),
    inset 12px 0px 12px -6px rgba(3, 15, 20, 0),
    inset -12px 0px 12px -6px rgba(3, 15, 20, 0),
    -1px -1px 6px 0px rgba(54, 69, 75, 1);
}

.language-switch:active {
  box-shadow:
    inset 0px -12px 12px -6px rgba(3, 15, 20, 1),
    inset 0px 12px 12px -6px rgba(3, 15, 20, 1),
    inset 12px 0px 12px -6px rgba(3, 15, 20, 1),
    inset -12px 0px 12px -6px rgba(3, 15, 20, 1),
    -1px -1px 6px 0px rgba(54, 69, 75, 1);
}

.language-switch-text {
  color: wheat;
  font-weight: 700;
  margin: auto;
  transition: all 0.3s;
  width: fit-content;
}

.language-switch:hover .language-switch-text {
  transform: scale(0.9);
}

.language-switch:active .language-switch-text {
  transform: scale(0.8);
}

.anaf-links
{
    text-align: center;
}

.anaf-links img {
  height: 50px;
  margin: 0 10px;
  transition: transform 0.2s;
}

.anaf-links img:hover {
  transform: scale(1.1);
}

* {
    user-select: none;
}


@media (max-width: 768px) {

    body {
        background-attachment: scroll;
        background-image: none;
        background-color: #2e2c27;
    }

    .home-layer,
    .introduction-layer,
    .program-layer,
    .visit-us-layer,
    .about {
        width: 85%;
        padding: 20px;
        border-radius: 20px;
    }

    .home-title {
        font-size: clamp(2.5rem, 10vw, 4rem);
        letter-spacing: 4px;
    }

    .introduction-title,
    .about-title,
    .visit-us-title {
        font-size: clamp(1.5rem, 6vw, 2.5rem);
        letter-spacing: 4px;
    }

    .home-description,
    .introduction-content,
    .program-content,
    .about-content,
    .visit-us {
        font-size: 16px;
    }

    .introduction-content,
    .program-content,
    .visit-us {
        flex-direction: column;
        gap: 20px;
        margin-left: 0;
        text-align: center;
    }

    .introduction-right img {
        width: 100%;
        height: auto;
        margin: 0;
    }

    .home-buttons,
    .visit-buttons {
        flex-direction: column;
        height: auto;
    }

    .button1, .button2,
    .visit-button-1, .visit-button-2 {
        margin: 10px 0;
        font-size: 16px;
        width: 100%;
        max-width: 250px;
    }

    .program-content-right {
        align-items: center;
    }

    .language-switch {
        top: 10px;
        right: 10px;
        font-size: 14px;
        padding: 0.5em 1em;
    }

    .footer-content {
        font-size: 14px;
        text-align: center;
        margin: 10px;
    }

    .anaf-links img {
        height: 40px;
    }

    .home-image
    {
        margin-top: 100px;
        margin-bottom: 50px;

        height: 100px;
        pointer-events: none;
        -webkit-user-drag: none;
    }

    .home-title
    {
        font-size: 70px;
    }

    .home-description
    {
        font-size: 20px;
    }

    .button1, .button2
    {
        font-size: 20px;
    }

    .home-layer
    {
        margin-bottom: 10px;
    }

    .program-layer
    {
        margin-top: 0px;
    }

    .program-content-left
    {
        font-size: 20px;
    }

    .introduction-layer
    {
        margin-top: 0px;
    }
    
    .introduction-content
    {
        font-size: 20px;
        align-items: center;
        text-align: center;
        justify-content: center;
    }

    .introduction-title
    {
        font-size: 40px;
    }

    .about-title
    {
        font-size: 40px;
    }

    .about-content
    {
        font-size: 20px;
    }

    .visit-us-title
    {
        font-size: 40px;
    }

    .visit-button-1, .visit-button-2
    {
        font-size: 25px;
    }

    * {
    user-select: none;
}
}
