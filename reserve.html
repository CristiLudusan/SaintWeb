<!DOCTYPE html>
<html lang="en">
    <style>

        form
{
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
}

form label
{
    color: white;
    font-size: 22px;
    margin-bottom: 10px;
    font-family: Arial, sans-serif;
}

form input,
form select
{
    width: 70%;
    max-width: 500px;

    padding: 18px;
    margin-bottom: 25px;

    border-radius: 15px;
    border: 2px solid rgba(255,255,255,0.15);

    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);

    color: white;
    font-size: 18px;

    transition: 0.3s ease;

    outline: none;
}

form input:focus,
form select:focus
{
    border-color: white;

    transform: scale(1.02);

    box-shadow:
        0 0 15px rgba(255,255,255,0.2),
        0 0 30px rgba(255,255,255,0.1);
}

form select option
{
    background: #1a1a1a;
    color: white;
}

.reserve-btn
{
    margin-top: 20px;
    font-size: 24px;
    padding: 18px 35px;
}


/* ===== MOBILE RESPONSIVE ===== */

@media screen and (max-width: 768px)
{
    .home-layer,
    .introduction-layer
    {
        width: 92%;
        border-radius: 25px;
        padding: 20px 0;
    }

    .home-image
    {
        height: 180px;
    }

    .home-title
    {
        font-size: clamp(3rem, 16vw, 5rem);
        letter-spacing: 4px;
    }

    .introduction-title
    {
        font-size: clamp(1.8rem, 9vw, 3rem);
        letter-spacing: 4px;
        margin-bottom: 40px;
    }

    .introduction-content
    {
        width: 100%;
        margin-left: 0;
        padding: 0 10px;
    }

    form
    {
        width: 100%;
    }

    form label
    {
        font-size: 18px;
        text-align: center;
    }

    form input,
    form select
    {
        width: 85%;
        font-size: 16px;
        padding: 15px;
        margin-bottom: 18px;
    }

    .reserve-btn
    {
        font-size: 18px;
        padding: 14px 24px;
        margin-top: 10px;
    }

    .button1
    {
        font-size: 16px;
        padding: 12px 18px;
        margin-left: 10px;
        margin-right: 10px;
    }

    .home-buttons
    {
        height: auto;
        flex-direction: column;
        gap: 15px;
    }

    .language-switch
    {
        top: 15px;
        right: 15px;
        font-size: 14px;
        padding: 0.5em 1.2em;
    }

    .footer-content
    {
        margin-left: 0;
        text-align: center;
        padding: 10px;
    }

    .anaf-links img
    {
        height: 40px;
        margin: 5px;
    }
}

<script src="https://cdn.jsdelivr.net/npm/appwrite"></script>

   <script>const client = new Appwrite.Client();

client
  .setEndpoint("https://cloud.appwrite.io/v1")
  .setProject("saintcafe"); // 🔴 schimbă aici

const databases = new Appwrite.Databases(client);</script>

<script>


async function trimiteRezervare() {
  try {
    const nume = document.getElementById("nume").value;
    const telefon = document.getElementById("telefon").value;
    const data = document.getElementById("data").value;
    const ora = document.getElementById("ora").value;
    const locatie = document.getElementById("locatie").value;

    // 🔒 validare simplă
    if (!nume || !telefon || !data || !ora || !locatie) {
      alert("Completează toate câmpurile");
      return;
    }

    const response = await databases.createDocument(
      "6a0883d5003cc55123c5",     // 🔴 schimbă
      "reservations",   // 🔴 schimbă
      Appwrite.ID.unique(),
      {
        nume: nume,
        telefon: telefon,
        data_rezervare: data,
        ora: ora,
        locatie: locatie
      }
    );

    console.log(response);
    alert("Rezervare trimisă cu succes!");

    // reset form
    document.getElementById("reservationForm").reset();

  } catch (error) {
    console.log(error);
    alert("Eroare la trimitere");
  }
}

</script>
