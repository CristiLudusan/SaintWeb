<script>


async function trimiteRezervare() {
  try {
    const nume = document.getElementById("nume").value;
    const telefon = document.getElementById("telefon").value;
    const data = document.getElementById("data").value;
    const ora = document.getElementById("ora").value;
    const locatie = document.getElementById("locatie").value;
    const persoane = document.getElementById("persoane").value;
    const mentiuni = document.getElementById("mentiuni").value;

    // validare câmpuri obligatorii
    if (!nume || !telefon || !data || !ora || !locatie) {
      alert("Completează toate câmpurile");
      return;
    }

    const response = await databases.createDocument(
      "6a0883d5003cc55123c5",
      "reservations",
      Appwrite.ID.unique(),
      {
        nume: nume,
        telefon: telefon,
        data_rezervare: data,
        ora: ora,
        locatie: locatie,
        persoane: persoane ? parseInt(persoane) : null,
        mentiuni: mentiuni || null
      }
    );

    console.log(response);
    alert("Rezervare trimisă cu succes!");

    // reset form
    document.getElementById("reservationForm").reset();

  } catch (error) {
    console.log(error);
    alert("Eroare la trimitere");
  }
}

</script>

<script>

document.addEventListener("DOMContentLoaded", () => {

    const dataInput = document.getElementById("data");
    const oraInput = document.getElementById("ora");

    // ===== DATA MINIMĂ = AZI =====

    const azi = new Date();

    const an = azi.getFullYear();
    const luna = String(azi.getMonth() + 1).padStart(2, '0');
    const zi = String(azi.getDate()).padStart(2, '0');

    const dataMinima = `${an}-${luna}-${zi}`;

    dataInput.min = dataMinima;


    // ===== INTERVAL 30 MIN =====

    oraInput.step = 1800;


    // ===== VALIDARE ORE =====

    oraInput.addEventListener("change", () => {

        const valoare = oraInput.value;

        if (!valoare) return;

        const [ore, minute] = valoare.split(":").map(Number);

        const totalMinute = ore * 60 + minute;

        const oraDeschidere = 8 * 60;   // 08:00
        const oraInchidere = 23 * 60;   // 23:00

        // verifică intervalul
        if (totalMinute < oraDeschidere || totalMinute > oraInchidere) {

            alert("Poți rezerva doar între 08:00 și 23:00");

            oraInput.value = "";
            return;
        }

        // verifică 30 în 30
        if (minute !== 0 && minute !== 30) {

            alert("Poți selecta doar intervale de 30 minute");

            oraInput.value = "";
        }

    });

});

function getToday() {
    return new Date().toISOString().split("T")[0];
}

document.addEventListener("DOMContentLoaded", () => {

    const dataInput = document.getElementById("data");

    const today = getToday();

    // setare min (pentru desktop + android)
    dataInput.min = today;

    // fix iOS: dacă user schimbă manual
    dataInput.addEventListener("change", () => {

        if (dataInput.value < today) {

            alert("Nu poți selecta o dată din trecut");

            // reset la ziua de azi
            dataInput.value = today;
        }
    });

});

</script>

<script>


document.addEventListener("DOMContentLoaded", () => {

    const dataInput = document.getElementById("data");

    // doar azi+
    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    const dd = String(now.getDate()).padStart(2, '0');

    dataInput.min = `${yyyy}-${mm}-${dd}`;

    generateTimeOptions();
});

function generateTimeOptions() {

    const oraInput = document.getElementById("ora");

    const start = 8 * 60;   // 08:00
    const end = 23 * 60;   // 23:00

    oraInput.innerHTML = "";

    for (let t = start; t <= end; t += 30) {

        const h = String(Math.floor(t / 60)).padStart(2, "0");
        const m = String(t % 60).padStart(2, "0");

        const opt = document.createElement("option");
        opt.value = `${h}:${m}`;
        opt.textContent = `${h}:${m}`;

        oraInput.appendChild(opt);
    }
}

</script>
