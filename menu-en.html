        function parseMenu(text) {
            const lines = text.split("\n").map(l => l.trim()).filter(l => l);
            const menu = {};
            let currentCategory = null;
            let currentSub = null;

            lines.forEach(line => {
                if (!line.includes("//")) {
                    if (line === line.toUpperCase() && currentCategory) {
                        currentSub = line;
                        menu[currentCategory].subcategories[currentSub] = [];
                        return;
                    }
                    currentCategory = line.toLowerCase();
                    menu[currentCategory] = { title: line, items: [], subcategories: {} };
                    currentSub = null;
                    return;
                }
                const parts = line.split("//").map(p => p.trim());
                const item = {
                    name: parts[0],
                    details: parts.slice(1, -1).join(" // "),
                    price: parts[parts.length - 1]
                };
                if (currentSub) menu[currentCategory].subcategories[currentSub].push(item);
                else menu[currentCategory].items.push(item);
            });
            return menu;
        }

        const menuData = parseMenu(rawMenu);
        const categories = Object.keys(menuData);
        const buttonsDiv = document.getElementById("menu-buttons");

        categories.forEach((cat) => {
            const btn = document.createElement("button");
            btn.innerText = menuData[cat].title;
            btn.onclick = (e) => {
                showMenu(cat);
                if (window.innerWidth <= 768) {
                    const container = document.querySelector('.menu-buttons');
                    if (btn.classList.contains('active-btn')) {
                        container.classList.toggle('expanded');
                    } else {
                        container.classList.remove('expanded');
                    }
                }
            };
            buttonsDiv.appendChild(btn);
        });

        function showMenu(category) {
            const container = document.getElementById("menu-container");
            container.classList.remove("show");

            setTimeout(() => {
                container.innerHTML = "";
                const currentIndex = categories.indexOf(category);
                const btns = document.querySelectorAll("#menu-buttons button");
                btns.forEach(b => b.classList.remove("active-btn"));
                if (btns[currentIndex]) btns[currentIndex].classList.add("active-btn");

                const data = menuData[category];
                const title = document.createElement("div");
                title.className = "category-title";
                title.innerText = data.title;
                container.appendChild(title);

                data.items.forEach((item, i) => {
                    const el = createItem(item);
                    el.style.animationDelay = `${i * 0.05}s`;
                    container.appendChild(el);
                });

                for (let sub in data.subcategories) {
                    const subTitle = document.createElement("div");
                    subTitle.className = "subcategory";
                    subTitle.innerText = sub;
                    container.appendChild(subTitle);
                    data.subcategories[sub].forEach((item, i) => {
                        const el = createItem(item);
                        el.style.animationDelay = `${i * 0.05}s`;
                        container.appendChild(el);
                    });
                }
                container.classList.add("show");
            }, 200);
        }

        function createItem(item) {
            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `
                <div><strong>${item.name}</strong><br>${item.details}</div>
                <div>${item.price}</div>
            `;
            return div;
        }

        showMenu(categories[0]);
    </script>
